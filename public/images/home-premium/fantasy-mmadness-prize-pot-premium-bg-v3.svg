<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="920" viewBox="0 0 1920 920" role="img" aria-label="Fantasy MMAdness win money prize pot arena background">
  <defs>
    <radialGradient id="redPulse" cx="20%" cy="28%" r="70%">
      <stop offset="0" stop-color="#ff2238" stop-opacity="0.9"/>
      <stop offset="0.34" stop-color="#8f0d19" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#03050b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldPulse" cx="56%" cy="22%" r="50%">
      <stop offset="0" stop-color="#ffd783" stop-opacity="0.78"/>
      <stop offset="0.42" stop-color="#b27016" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#03050b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bluePulse" cx="87%" cy="36%" r="58%">
      <stop offset="0" stop-color="#2c7cff" stop-opacity="0.48"/>
      <stop offset="0.42" stop-color="#0f3b86" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#03050b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardDark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171b28" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#05070d" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="redGold" x1="0" x2="1">
      <stop offset="0" stop-color="#ff2038"/>
      <stop offset="0.58" stop-color="#ff5440"/>
      <stop offset="1" stop-color="#ffd27c"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4b7"/>
      <stop offset="0.45" stop-color="#ffce61"/>
      <stop offset="1" stop-color="#9d5d08"/>
    </linearGradient>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0V96" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="drop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
    <filter id="neonRed" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ff2638" flood-opacity="0.72"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#ff2638" flood-opacity="0.4"/>
    </filter>
    <filter id="neonGold" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffd27c" flood-opacity="0.62"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#ffd27c" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1920" height="920" fill="#03050b"/>
  <rect width="1920" height="920" fill="url(#redPulse)"/>
  <rect width="1920" height="920" fill="url(#goldPulse)"/>
  <rect width="1920" height="920" fill="url(#bluePulse)"/>
  <rect width="1920" height="920" fill="url(#grid)" opacity="0.9"/>

  <g opacity="0.20" filter="url(#blur)">
    <path d="M86 -40 516 940H374L0 80Z" fill="#ff2638"/>
    <path d="M712 -10 484 940H370L610 0Z" fill="#ffd27c" opacity="0.75"/>
    <path d="M1528 -60 1188 940h-128L1394 0Z" fill="#2e7bff" opacity="0.7"/>
  </g>

  <g transform="translate(734 190)" opacity="0.22">
    <path d="M206 0 528 132 594 424 370 650 42 596 -122 312Z" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M216 58 476 162 535 398 352 586 78 542 -54 318Z" fill="none" stroke="#ff2638" stroke-width="3" opacity="0.95"/>
    <path d="M228 124 420 198 462 370 326 508 122 474 26 322Z" fill="none" stroke="#ffd27c" stroke-width="2" opacity="0.78"/>
  </g>

  <g transform="translate(360 378)" opacity="0.24" filter="url(#neonRed)">
    <text x="0" y="0" fill="#ffffff" font-family="Impact, Arial Black, sans-serif" font-size="136" letter-spacing="10">FANTASY</text>
    <text x="72" y="120" fill="#ff2638" font-family="Impact, Arial Black, sans-serif" font-size="134" letter-spacing="8">MMADNESS</text>
  </g>

  <g transform="translate(700 112) rotate(4)" filter="url(#drop)" opacity="0.9">
    <rect width="390" height="102" rx="28" fill="url(#cardDark)" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="30" y="42" fill="#ffffff" font-family="Impact, Arial Black, sans-serif" font-size="28" letter-spacing="4">FANTASY MMADNESS</text>
    <text x="30" y="76" fill="#ff3145" font-family="Arial Black, Arial, sans-serif" font-size="18" letter-spacing="4">PICK • PLAY • WIN</text>
  </g>

  <g transform="translate(1052 258) rotate(-5)" filter="url(#drop)" opacity="0.95">
    <rect width="352" height="112" rx="28" fill="url(#cardDark)" stroke="#ffd27c" stroke-opacity="0.46"/>
    <text x="32" y="48" fill="#ffd27c" font-family="Impact, Arial Black, sans-serif" font-size="42" letter-spacing="4" filter="url(#neonGold)">$ PRIZE POT</text>
    <text x="34" y="82" fill="#ffffff" font-family="Arial Black, Arial, sans-serif" font-size="16" letter-spacing="4">WIN CASH REWARDS</text>
  </g>

  <g transform="translate(252 178) rotate(-8)" filter="url(#drop)" opacity="0.82">
    <rect width="292" height="82" rx="41" fill="url(#cardDark)" stroke="#ffcd78" stroke-opacity="0.52"/>
    <circle cx="44" cy="41" r="19" fill="url(#redGold)"/>
    <text x="80" y="37" fill="#ffd892" font-family="Impact, Arial Black, sans-serif" font-size="20" letter-spacing="3">WIN MONEY</text>
    <text x="80" y="62" fill="#ffffff" fill-opacity="0.8" font-family="Arial Black, Arial, sans-serif" font-size="12" letter-spacing="2">FIGHT CARD</text>
    <text x="36" y="49" fill="#fff" font-family="Arial Black, Arial, sans-serif" font-size="22">$</text>
  </g>

  <g transform="translate(1232 510) rotate(5)" filter="url(#drop)" opacity="0.76">
    <rect width="378" height="92" rx="26" fill="url(#cardDark)" stroke="#2e7bff" stroke-opacity="0.36"/>
    <text x="30" y="39" fill="#ffffff" font-family="Impact, Arial Black, sans-serif" font-size="25" letter-spacing="4">LIVE LEADERBOARD</text>
    <rect x="30" y="58" width="262" height="8" rx="4" fill="#ff2638" opacity="0.9"/>
    <rect x="30" y="74" width="314" height="8" rx="4" fill="#ffd27c" opacity="0.7"/>
  </g>

  <g transform="translate(820 640) rotate(-3)" filter="url(#drop)" opacity="0.7">
    <rect width="330" height="88" rx="25" fill="url(#cardDark)" stroke="#ff2638" stroke-opacity="0.35"/>
    <text x="28" y="38" fill="#ffffff" font-family="Impact, Arial Black, sans-serif" font-size="24" letter-spacing="4">TOKEN JACKPOT</text>
    <text x="28" y="64" fill="#ffd27c" font-family="Arial Black, Arial, sans-serif" font-size="14" letter-spacing="3">CASH PRIZE POOL</text>
  </g>

  <g transform="translate(1458 188)" opacity="0.48" filter="url(#drop)">
    <circle cx="0" cy="0" r="42" fill="url(#coin)"/>
    <circle cx="48" cy="30" r="42" fill="url(#coin)"/>
    <circle cx="-52" cy="42" r="42" fill="url(#coin)"/>
    <circle cx="6" cy="54" r="42" fill="url(#coin)"/>
    <text x="-13" y="14" fill="#3b2102" font-family="Arial Black, Arial, sans-serif" font-size="42">$</text>
  </g>

  <g transform="translate(138 620)" opacity="0.38" filter="url(#drop)">
    <circle cx="0" cy="0" r="36" fill="url(#coin)"/>
    <circle cx="42" cy="23" r="36" fill="url(#coin)"/>
    <circle cx="-42" cy="24" r="36" fill="url(#coin)"/>
    <text x="-11" y="13" fill="#3b2102" font-family="Arial Black, Arial, sans-serif" font-size="36">$</text>
  </g>

  <g opacity="0.34">
    <path d="M0 718c318-76 586-108 940-90 342 18 596 78 980 38v254H0Z" fill="#010207"/>
    <path d="M0 756c374-78 722-86 1084-32 300 44 548 44 836 8" fill="none" stroke="#ff2638" stroke-opacity="0.34" stroke-width="3"/>
    <path d="M0 794c372-56 658-60 934-18 388 58 648 60 986 14" fill="none" stroke="#ffd27c" stroke-opacity="0.22" stroke-width="2"/>
  </g>

  <g opacity="0.16">
    <text x="78" y="886" fill="#ffffff" font-family="Arial Black, Arial, sans-serif" font-size="18" letter-spacing="7">BOXING • MMA • BARE-KNUCKLE • KICKBOXING • PRO WRESTLING</text>
  </g>
