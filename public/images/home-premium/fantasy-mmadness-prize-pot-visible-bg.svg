    </linearGradient>
    <linearGradient id="coin" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4ad"/>
      <stop offset="0.46" stop-color="#ffc75f"/>
      <stop offset="1" stop-color="#9f610c"/>
    </linearGradient>
    <pattern id="grid" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M84 0H0V84" fill="none" stroke="#fff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.62"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

