    <text x="32" y="78" fill="#ffd684" font-family="Arial Black, Arial, sans-serif" font-size="15" letter-spacing="4">CLIMB CASH RANKINGS</text>
    <rect x="32" y="92" width="144" height="8" rx="4" fill="#ff3045" opacity="0.88"/>
    <rect x="188" y="92" width="152" height="8" rx="4" fill="#ffd684" opacity="0.72"/>
  </g>

  <g transform="translate(836 660) rotate(6)" filter="url(#shadow)" opacity="0.72">
    <rect width="360" height="96" rx="28" fill="url(#card)" stroke="#ff3045" stroke-opacity="0.34"/>
    <text x="28" y="42" fill="#fff" font-family="Impact, Arial Black, sans-serif" font-size="27" letter-spacing="4">TOKEN JACKPOT</text>
    <text x="30" y="70" fill="#ffd684" font-family="Arial Black, Arial, sans-serif" font-size="14" letter-spacing="3.5">PREDICT EVERY CARD</text>
