  <g opacity="0.32">
    <path d="M0 772c320-70 602-88 888-56 380 42 656 80 1032 20v224H0Z" fill="#010207"/>
    <path d="M0 806c410-72 748-68 1086-16 314 48 550 38 834-20" fill="none" stroke="#ff3045" stroke-opacity="0.3" stroke-width="3"/>
    <path d="M0 846c366-48 662-44 924-8 382 52 650 52 996 4" fill="none" stroke="#ffd684" stroke-opacity="0.18" stroke-width="2"/>
  </g>
