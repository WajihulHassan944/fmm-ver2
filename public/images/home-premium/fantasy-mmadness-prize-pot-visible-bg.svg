<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="960" viewBox="0 0 1920 960" role="img" aria-label="Fantasy MMAdness premium prize pot arena background">
  <defs>
    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
