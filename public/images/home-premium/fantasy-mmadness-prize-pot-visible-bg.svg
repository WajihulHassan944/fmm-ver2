    <circle cx="46" cy="41" r="20" fill="#ff3045"/>
    <text x="39" y="49" fill="#fff" font-family="Arial Black, Arial, sans-serif" font-size="25">$</text>
    <text x="80" y="38" fill="#ffd684" font-family="Impact, Arial Black, sans-serif" font-size="19" letter-spacing="3">WIN MONEY</text>
    <text x="80" y="62" fill="#fff" fill-opacity="0.78" font-family="Arial Black, Arial, sans-serif" font-size="12" letter-spacing="2.6">FIGHT CARD</text>
